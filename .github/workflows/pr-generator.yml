name: Auto PR Generator (VRAM 8GB Strict Mode)

# Issueが新しく作成された時のみ発火する
on:
  issues:
    types: [opened]

# ワークフローにPR作成とコンテンツ書き込みの権限を付与
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-pr:
    # 非常に重要: クラウドではなく、あなたのローカルPCで実行させる指定
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Phase 0 & 1 - Gatekeeper (VRAM & Rules Check)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .\scripts\Gatekeeper.ps1 -IssueNumber ${{ github.event.issue.number }}

      - name: Extract Feature Name from Title
        id: extract
        run: |
          # タイトルの最初の単語（スペースやコロンの前まで）を機能名として抽出
          $title = "${{ github.event.issue.title }}"
          $featureName = ($title -split '[: 　]')[0]
          Write-Host "抽出された機能名: $featureName"
          # Actionsの後続ステップへ変数を渡す
          "FEATURE_NAME=$featureName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Phase 2 - Scaffolding (Blueprint Copy)
        run: |
          .\scripts\Scaffolding.ps1 -FeatureName "${{ env.FEATURE_NAME }}"

      - name: Phase 3 - Coding (Qwen2.5-Coder-7B + Aider)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .\scripts\Coding.ps1 -FeatureName "${{ env.FEATURE_NAME }}" -IssueNumber ${{ github.event.issue.number }}

      - name: Phase 4 - Commit and Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # 1. PowerShellのコンソール入出力をUTF-8に強制する
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::InputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8

          $BranchName = "feature/issue-${{ github.event.issue.number }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b $BranchName
          git add src/features/${{ env.FEATURE_NAME }}/*
          
          if (git status --porcelain) {
            git commit -m "Auto-generated implementation for Issue #${{ github.event.issue.number }}"
            git push origin $BranchName
            
            # 2. 変数ではなく環境変数（$env:）に詰めることで、gh コマンドへの受け渡し時の文字化けを防ぐ
            $env:PR_TITLE = "Resolve #${{ github.event.issue.number }}: $env:ISSUE_TITLE"
            $env:PR_BODY = "🤖 **Automated PR Generated by Qwen2.5-Coder-7B & Aider**`n`nCloses #${{ github.event.issue.number }}"
            
            gh pr create --title "$env:PR_TITLE" --body "$env:PR_BODY" --base main --head $BranchName
            
            Write-Host "PRの作成が完了しました！"
          } else {
            Write-Host "コミットすべき変更がありませんでした。"
          }